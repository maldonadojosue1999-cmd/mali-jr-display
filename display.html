<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mali JR. — Display</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0f14;--sur:#141820;--s2:#1c2230;--bor:#252d3d;
  --acc:#ff5c00;--a2:#ff8c42;--tx:#e8eaf0;--mu:#6b7a99;
  --ok:#10b981;--wa:#f59e0b;--da:#ef4444;--bl:#3b82f6;
  --r:12px;--rs:8px;
}
html,body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100%;}

/* ── HEADER ── */
.hdr{
  background:linear-gradient(135deg,#0c0f14 0%,#1a1020 100%);
  border-bottom:2px solid var(--acc);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:60px;position:sticky;top:0;z-index:50;
}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;}
.logo span{color:var(--acc);}
.hdr-center{display:flex;flex-direction:column;align-items:center;}
.hora{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--acc);letter-spacing:3px;line-height:1;}
.fecha-txt{font-size:10px;color:var(--mu);margin-top:1px;}
.hdr-right{display:flex;gap:10px;align-items:center;}
.sync-pill{display:flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--bor);border-radius:20px;padding:4px 10px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:blink 2s infinite;}
.sync-dot.off{background:var(--mu);animation:none;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.sync-txt{font-size:10px;color:var(--mu);}

/* ── STATS BAR ── */
.stats-bar{
  display:grid;grid-template-columns:repeat(4,1fr);gap:0;
  background:var(--sur);border-bottom:1px solid var(--bor);
}
.stat-item{
  padding:10px 16px;text-align:center;border-right:1px solid var(--bor);
  position:relative;overflow:hidden;
}
.stat-item:last-child{border-right:none;}
.stat-item::before{content:'';position:absolute;inset:0;opacity:.05;background:var(--stat-color,#fff);}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;color:var(--stat-color,var(--tx));}
.stat-lbl{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

/* ── ALERTA URGENTE BANNER ── */
.banner-urgente{
  background:linear-gradient(90deg,#7f1d1d,#ef4444,#7f1d1d);
  background-size:200% 100%;
  animation:bannerMove 3s linear infinite;
  color:#fff;text-align:center;padding:8px;
  font-size:13px;font-weight:700;letter-spacing:1px;display:none;
}
@keyframes bannerMove{0%{background-position:0% 0}100%{background-position:200% 0}}

/* ── SLIDESHOW ── */
.slideshow-wrap{
  background:linear-gradient(135deg,rgba(255,92,0,.08),rgba(255,92,0,.02));
  border-bottom:1px solid var(--bor);
  padding:12px 20px;display:none;
  overflow:hidden;position:relative;min-height:70px;
}
.slideshow-label{font-size:10px;color:var(--acc);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;font-weight:600;}
.slide{display:none;animation:fadeSlide .5s ease;}
.slide.active{display:flex;align-items:center;gap:16px;}
@keyframes fadeSlide{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.slide-foto{width:48px;height:48px;border-radius:8px;object-fit:cover;border:2px solid var(--acc);flex-shrink:0;}
.slide-foto-ph{width:48px;height:48px;border-radius:8px;background:var(--s2);border:2px solid var(--bor);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.slide-info{flex:1;min-width:0;}
.slide-nombre{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.slide-sub{font-size:12px;color:var(--mu);margin-top:2px;}
.slide-meta{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;}
.slide-right{text-align:right;flex-shrink:0;}
.slide-dias{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1;}
.slide-dias-lbl{font-size:10px;color:var(--mu);text-transform:uppercase;}
.slide-dots{display:flex;gap:5px;justify-content:center;margin-top:8px;}
.slide-dot{width:6px;height:6px;border-radius:50%;background:var(--bor);transition:background .3s;}
.slide-dot.on{background:var(--acc);}

/* ── MAIN ── */
.main{display:flex;flex-direction:column;flex:1;}

/* ── CALENDARIO ── */
.cal-wrap{padding:16px;display:flex;flex-direction:column;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-titulo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;}
.nav-btn{background:var(--s2);border:1px solid var(--bor);color:var(--tx);width:34px;height:34px;border-radius:var(--rs);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.nav-btn:hover{border-color:var(--acc);color:var(--acc);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dayname{text-align:center;font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;padding:4px 0;font-weight:700;}
.cal-day{
  background:var(--s2);border:1px solid var(--bor);border-radius:var(--rs);
  padding:5px 3px;cursor:pointer;transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  min-height:52px;
}
.cal-day:hover{border-color:var(--acc);transform:scale(1.03);}
.cal-day.today{border-color:var(--acc);background:rgba(255,92,0,.1);}
.cal-day.has-orders{border-color:var(--ok);background:rgba(16,185,129,.07);}
.cal-day.has-urgent{border-color:var(--da);background:rgba(239,68,68,.1);animation:pulseRed 2s infinite;}
.cal-day.selected{border-color:var(--bl);background:rgba(59,130,246,.12);box-shadow:0 0 0 2px var(--bl);}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default;}
.cal-day.empty:hover{transform:none;}
.cal-day.past{opacity:.45;}
@keyframes pulseRed{0%,100%{box-shadow:none}50%{box-shadow:0 0 10px rgba(239,68,68,.5);}}
.day-num{font-family:'Bebas Neue',sans-serif;font-size:18px;line-height:1;}
.cal-day.today .day-num{color:var(--acc);}
.day-dot-row{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;}
.day-dot{width:5px;height:5px;border-radius:50%;}
.day-count{font-size:8px;font-weight:700;color:var(--ok);background:rgba(16,185,129,.15);border-radius:8px;padding:0 4px;}
.day-count.ur{color:var(--da);background:rgba(239,68,68,.15);}

/* ── SIDEBAR ── */
.sidebar{background:var(--sur);border-top:1px solid var(--bor);overflow:visible;}
.sidebar-hdr{padding:14px 16px 10px;border-bottom:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between;}
.sidebar-titulo{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;}
.sidebar-sub{font-size:11px;color:var(--mu);}
.sidebar-list{padding:10px;}
.pedido-item{
  background:var(--s2);border:1px solid var(--bor);border-radius:var(--rs);
  padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:all .2s;
  display:flex;gap:10px;align-items:center;
}
.pedido-item:hover{border-color:var(--acc);transform:translateX(3px);}
.pedido-item.urgente{border-color:var(--da);animation:pulseRed 3s infinite;}
.pedido-item.hoy{border-color:var(--ok);}
.pi-foto{width:38px;height:38px;border-radius:7px;object-fit:cover;flex-shrink:0;border:1px solid var(--bor);}
.pi-foto-ph{width:38px;height:38px;border-radius:7px;background:var(--sur);border:1px solid var(--bor);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.pi-info{flex:1;min-width:0;}
.pi-nombre{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pi-sub{font-size:10px;color:var(--mu);margin-top:1px;}
.pi-meta{display:flex;gap:5px;margin-top:5px;align-items:center;flex-wrap:wrap;}
.pi-dias{font-family:'Bebas Neue',sans-serif;font-size:18px;flex-shrink:0;}
.badge{padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;}
.sidebar-empty{text-align:center;color:var(--mu);padding:30px 16px;font-size:13px;}

/* ── ALERTAS DIA SIDEBAR ── */
.alerta-dia{
  margin:8px 10px 0;padding:9px 13px;border-radius:var(--rs);font-size:12px;
  display:flex;align-items:center;gap:8px;font-weight:500;
}
.al-rojo{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
.al-naranja{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:#fcd34d;}
.al-verde{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{
  background:var(--sur);border:1px solid var(--bor);border-radius:18px;
  width:100%;max-width:860px;max-height:88vh;overflow-y:auto;padding:24px;
  animation:popIn .2s ease;
}
.modal::-webkit-scrollbar{width:5px;}
.modal::-webkit-scrollbar-thumb{background:var(--bor);border-radius:3px;}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;}
.modal-titulo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;}
.modal-sub{font-size:12px;color:var(--mu);margin-top:4px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.close-btn{background:var(--s2);border:1px solid var(--bor);color:var(--mu);width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.close-btn:hover{border-color:var(--da);color:var(--da);}
.tabs{display:flex;gap:3px;border-bottom:1px solid var(--bor);margin-bottom:16px;padding-bottom:10px;overflow-x:auto;}
.tab-btn{background:none;border:none;color:var(--mu);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:6px 13px;border-radius:var(--rs);cursor:pointer;transition:all .2s;white-space:nowrap;}
.tab-btn.on{color:var(--acc);background:rgba(255,92,0,.1);}
.ptbl{width:100%;border-collapse:collapse;font-size:13px;}
.ptbl th{background:var(--acc);color:#fff;padding:8px 10px;text-align:left;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;}
.ptbl td{padding:8px 10px;border-bottom:1px solid var(--bor);vertical-align:middle;}
.ptbl tr:nth-child(even) td{background:rgba(255,255,255,.02);}
.num-cell{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--acc);}
.talla-cell{background:rgba(255,92,0,.12);color:var(--acc);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
.talla-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-top:8px;}
.talla-card{background:var(--s2);border:2px solid var(--acc);border-radius:var(--rs);padding:12px;text-align:center;}
.talla-num{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--acc);line-height:1;}
.talla-lbl{font-size:11px;color:var(--mu);text-transform:uppercase;margin-top:3px;}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.info-card{background:var(--s2);border-radius:var(--rs);padding:12px;}
.info-lbl{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
.info-val{font-weight:700;font-size:15px;}
.modal-foto{width:100%;max-height:180px;object-fit:cover;border-radius:var(--rs);margin-bottom:14px;}

/* ── TOAST ── */
.notif-toast{
  position:fixed;top:70px;right:16px;z-index:999;
  background:var(--acc);color:#fff;padding:14px 18px;
  border-radius:14px;font-weight:600;font-size:14px;
  box-shadow:0 6px 24px rgba(0,0,0,.5);max-width:320px;
  animation:slideIn .3s ease;display:none;
}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
.notif-titulo{font-size:14px;font-weight:700;margin-bottom:3px;}
.notif-body{font-size:12px;opacity:.9;}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .stats-bar{grid-template-columns:repeat(2,1fr);}
  .stat-item:nth-child(2){border-right:none;}
  .stat-item:nth-child(3){border-right:1px solid var(--bor);}
  .cal-day{min-height:44px;padding:3px 2px;}
  .day-num{font-size:14px;}
  .hdr{height:52px;padding:0 12px;}
  .hora{font-size:20px;}
  .logo{font-size:22px;}
}
@media(min-width:800px){
  .main{flex-direction:row;}
  .cal-wrap{flex:1;padding:20px;}
  .sidebar{border-top:none;border-left:1px solid var(--bor);width:300px;flex-shrink:0;}
  .cal-day{min-height:70px;padding:7px 5px;}
  .day-num{font-size:20px;}
  .cal-titulo{font-size:24px;}
  .slideshow-wrap{display:block;}
  .fecha-txt{display:block;}
}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="hdr">
    <div class="logo">MALI<span> JR.</span></div>
    <div class="hdr-center">
      <div class="hora" id="reloj">00:00</div>
      <div class="fecha-txt" id="fechaHoy"></div>
    </div>
    <div class="hdr-right">
      <div class="sync-pill">
        <div class="sync-dot off" id="syncDot"></div>
        <div class="sync-txt" id="syncTxt">Sin datos</div>
      </div>
    </div>
  </header>

  <!-- STATS BAR -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-item" style="--stat-color:var(--wa)">
      <div class="stat-num" id="statPendiente">0</div>
      <div class="stat-lbl">Pendientes</div>
    </div>
    <div class="stat-item" style="--stat-color:var(--bl)">
      <div class="stat-num" id="statProceso">0</div>
      <div class="stat-lbl">En proceso</div>
    </div>
    <div class="stat-item" style="--stat-color:var(--ok)">
      <div class="stat-num" id="statListo">0</div>
      <div class="stat-lbl">Listos</div>
    </div>
    <div class="stat-item" style="--stat-color:var(--acc)">
      <div class="stat-num" id="statPrendas">0</div>
      <div class="stat-lbl">Prendas</div>
    </div>
  </div>

  <!-- BANNER URGENTE (solo cuando hay entrega hoy) -->
  <div class="banner-urgente" id="bannerUrgente"></div>

  <!-- SLIDESHOW pedidos activos -->
  <div class="slideshow-wrap" id="slideshowWrap">
    <div class="slideshow-label">📋 Pedidos activos</div>
    <div id="slideshowSlides"></div>
    <div class="slide-dots" id="slideDots"></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <!-- CALENDARIO -->
    <div class="cal-wrap">
      <div class="cal-nav">
        <button class="nav-btn" onclick="cambiarMes(-1)">‹</button>
        <div class="cal-titulo" id="calTitulo"></div>
        <button class="nav-btn" onclick="cambiarMes(1)">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-hdr">
        <div>
          <div class="sidebar-titulo" id="sidebarTitulo">Selecciona un día</div>
          <div class="sidebar-sub" id="sidebarSub">Toca un día del calendario</div>
        </div>
      </div>
      <div id="alertaDia"></div>
      <div class="sidebar-list" id="sidebarList">
        <div class="sidebar-empty">📅<br>Toca un día para ver los pedidos</div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" style="display:none" onclick="if(event.target===this)cerrarModal()">
  <div class="modal" id="modalContent"></div>
</div>

<!-- TOAST -->
<div class="notif-toast" id="notifToast"></div>

<script>
// ══════════════════════════════════════════
// ESTADO
// ══════════════════════════════════════════
let pedidos = [], mesActual = new Date().getMonth(), anioActual = new Date().getFullYear();
let diaSeleccionado = null, ultimoUpdate = null, tabActual = "lista";
let slideIdx = 0, slideTimer = null;
const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DIAS  = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const EC    = {Pendiente:"#f59e0b","En proceso":"#3b82f6",Listo:"#10b981",Entregado:"#6b7280"};
const HORAS_ALERTA = [10, 14];

const hoy = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };
const Q = n => "Q"+Number(n||0).toLocaleString("es-GT",{minimumFractionDigits:2,maximumFractionDigits:2});
const diasRestantes = f => {
  if(!f) return null;
  const [y,m,d]=f.split("-").map(Number);
  const hoyD=new Date(), hoyF=new Date(hoyD.getFullYear(),hoyD.getMonth(),hoyD.getDate());
  return Math.round((new Date(y,m-1,d)-hoyF)/86400000);
};
const colorDias = d => d<0?"var(--da)":d===0?"var(--da)":d<=3?"var(--wa)":"var(--ok)";
const textoDias = d => d<0?`⚠️ Venció ${Math.abs(d)}d`:d===0?"🚨 HOY":d===1?"🔥 Mañana":`📅 ${d}d`;

// ══════════════════════════════════════════
// RELOJ
// ══════════════════════════════════════════
function tick() {
  const n = new Date();
  document.getElementById("reloj").textContent = `${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`;
  document.getElementById("fechaHoy").textContent = n.toLocaleDateString("es-GT",{weekday:"long",day:"numeric",month:"long"});
}
setInterval(tick,1000); tick();

// ══════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════
let audioCtx = null;
function desbloquearAudio() {
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  document.getElementById("btnAudio")?.remove();
}
document.addEventListener("click", desbloquearAudio, {once:true});
document.addEventListener("touchstart", desbloquearAudio, {once:true});

function sonarAlerta(urgente=false) {
  if(!audioCtx) return;
  const freqs = urgente ? [660,880,660,880] : [440,550,660];
  freqs.forEach((f,i)=>{
    const osc=audioCtx.createOscillator(), gain=audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value=f; osc.type=urgente?"square":"sine";
    const t=audioCtx.currentTime+i*0.2;
    gain.gain.setValueAtTime(urgente?.4:.3,t);
    gain.gain.exponentialRampToValueAtTime(.001,t+.3);
    osc.start(t); osc.stop(t+.35);
  });
}

setTimeout(()=>{
  if(!audioCtx){
    const btn=document.createElement("button");
    btn.id="btnAudio";
    btn.textContent="🔔 Activar sonido";
    btn.style.cssText="position:fixed;bottom:20px;right:16px;z-index:500;background:var(--acc);color:#fff;border:none;border-radius:20px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(255,92,0,.4)";
    btn.onclick=()=>desbloquearAudio();
    document.body.appendChild(btn);
  }
},2000);

// ══════════════════════════════════════════
// FETCH
// ══════════════════════════════════════════
async function fetchData() {
  try {
    const res=await fetch("/data"), data=await res.json();
    if(data.updatedAt!==ultimoUpdate){
      ultimoUpdate=data.updatedAt;
      pedidos=data.pedidos||[];
      renderStats(); renderBannerUrgente(); renderCalendario();
      renderSlideshow();
      if(diaSeleccionado) renderSidebar(diaSeleccionado);
      document.getElementById("syncDot").className="sync-dot";
      document.getElementById("syncTxt").textContent=`Sync ${new Date(data.updatedAt).toLocaleTimeString("es-GT",{hour:"2-digit",minute:"2-digit"})}`;
    }
    verificarNotificaciones();
  } catch(e){
    document.getElementById("syncDot").className="sync-dot off";
    document.getElementById("syncTxt").textContent="Sin conexión";
  }
}
fetchData();
setInterval(fetchData,15000);
setInterval(verificarNotificaciones,60000);

// ══════════════════════════════════════════
// STATS BAR
// ══════════════════════════════════════════
function renderStats() {
  const activos = pedidos.filter(p=>p.estado!=="Entregado");
  document.getElementById("statPendiente").textContent = pedidos.filter(p=>p.estado==="Pendiente").length;
  document.getElementById("statProceso").textContent   = pedidos.filter(p=>p.estado==="En proceso").length;
  document.getElementById("statListo").textContent     = pedidos.filter(p=>p.estado==="Listo").length;
  document.getElementById("statPrendas").textContent   = activos.reduce((a,p)=>a+p.items.length,0);
}

// ══════════════════════════════════════════
// SLIDESHOW
// ══════════════════════════════════════════
function renderSlideshow() {
  const activos = pedidos
    .filter(p=>p.estado!=="Entregado" && p.fechaEntrega)
    .sort((a,b)=>diasRestantes(a.fechaEntrega)-diasRestantes(b.fechaEntrega));

  const wrap = document.getElementById("slideshowWrap");
  if(activos.length===0){ wrap.style.display="none"; return; }
  wrap.style.display="block";

  const slidesEl = document.getElementById("slideshowSlides");
  const dotsEl   = document.getElementById("slideDots");
  slidesEl.innerHTML=""; dotsEl.innerHTML="";

  activos.forEach((p,i)=>{
    const d = diasRestantes(p.fechaEntrega);
    const tallas = p.items.reduce((a,it)=>{ a[it.talla]=(a[it.talla]||0)+1; return a; },{});
    const tallasTxt = Object.entries(tallas).map(([k,v])=>`${k}:${v}`).join(" ");

    const slide = document.createElement("div");
    slide.className = "slide" + (i===slideIdx?" active":"");
    slide.innerHTML = `
      ${p.foto ? `<img src="${p.foto}" class="slide-foto" alt="">` : `<div class="slide-foto-ph">👕</div>`}
      <div class="slide-info">
        <div class="slide-nombre">${p.equipo||p.cliente}</div>
        <div class="slide-sub">👤 ${p.cliente}${p.deporte?" · "+p.deporte:""} · ${p.items.length} prendas</div>
        <div class="slide-meta">
          <span class="badge" style="background:${EC[p.estado]}22;color:${EC[p.estado]};border:1px solid ${EC[p.estado]}44">${p.estado}</span>
          <span style="font-size:11px;color:var(--mu)">${tallasTxt}</span>
        </div>
      </div>
      <div class="slide-right">
        <div class="slide-dias" style="color:${colorDias(d)}">${d<0?Math.abs(d):d}</div>
        <div class="slide-dias-lbl">${d<0?"días vencido":d===0?"entrega HOY":d===1?"día restante":"días restantes"}</div>
      </div>`;
    slide.onclick = ()=>abrirModal(p);
    slidesEl.appendChild(slide);

    const dot = document.createElement("div");
    dot.className = "slide-dot" + (i===slideIdx?" on":"");
    dotsEl.appendChild(dot);
  });

  if(slideTimer) clearInterval(slideTimer);
  if(activos.length>1){
    slideTimer = setInterval(()=>avanzarSlide(activos.length), 4000);
  }
}

function avanzarSlide(total) {
  const slides = document.querySelectorAll(".slide");
  const dots   = document.querySelectorAll(".slide-dot");
  if(slides.length===0) return;
  slides[slideIdx].classList.remove("active");
  dots[slideIdx].classList.remove("on");
  slideIdx = (slideIdx+1) % total;
  slides[slideIdx].classList.add("active");
  dots[slideIdx].classList.add("on");
}

// ══════════════════════════════════════════
// CALENDARIO
// ══════════════════════════════════════════
function renderCalendario() {
  document.getElementById("calTitulo").textContent = `${MESES[mesActual]} ${anioActual}`;
  const grid = document.getElementById("calGrid");
  grid.innerHTML = "";
  DIAS.forEach(d=>{ const el=document.createElement("div"); el.className="cal-dayname"; el.textContent=d; grid.appendChild(el); });

  const primerDia = new Date(anioActual,mesActual,1).getDay();
  const diasMes   = new Date(anioActual,mesActual+1,0).getDate();
  const hoyStr    = hoy();
  const hoyD      = new Date(); const hoyFecha=new Date(hoyD.getFullYear(),hoyD.getMonth(),hoyD.getDate());

  const porDia = {};
  pedidos.forEach(p=>{
    if(!p.fechaEntrega||p.estado==="Entregado") return;
    const [y,m] = p.fechaEntrega.split("-").map(Number);
    if(y===anioActual && m-1===mesActual){
      const d=parseInt(p.fechaEntrega.split("-")[2]);
      if(!porDia[d]) porDia[d]=[];
      porDia[d].push(p);
    }
  });

  for(let i=0;i<primerDia;i++){ const el=document.createElement("div"); el.className="cal-day empty"; grid.appendChild(el); }

  for(let d=1;d<=diasMes;d++){
    const fechaStr=`${anioActual}-${String(mesActual+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const ps=porDia[d]||[];
    const dr=diasRestantes(fechaStr);
    const esHoy=fechaStr===hoyStr;
    const isPast=new Date(anioActual,mesActual,d)<hoyFecha;
    const esUrgente=ps.length>0&&dr<=0;
    const tieneP=ps.length>0;

    const el=document.createElement("div");
    el.className="cal-day"+(esHoy?" today":"")+(esUrgente?" has-urgent":tieneP?" has-orders":"")+(diaSeleccionado===fechaStr?" selected":"")+(isPast&&!esHoy&&!tieneP?" past":"");
    el.onclick=()=>seleccionarDia(fechaStr);

    const numEl=document.createElement("div"); numEl.className="day-num"; numEl.textContent=d; el.appendChild(numEl);

    if(ps.length>0){
      const countEl=document.createElement("div");
      countEl.className="day-count"+(dr<=0?" ur":"");
      countEl.textContent=ps.length+" pedido"+(ps.length!==1?"s":"");
      el.appendChild(countEl);
      const dotRow=document.createElement("div"); dotRow.className="day-dot-row";
      ps.slice(0,4).forEach(p=>{
        const dot=document.createElement("div");
        dot.className="day-dot";
        dot.style.background=EC[p.estado]||"var(--mu)";
        dotRow.appendChild(dot);
      });
      el.appendChild(dotRow);
    }
    grid.appendChild(el);
  }
}

function cambiarMes(dir){
  mesActual+=dir;
  if(mesActual>11){mesActual=0;anioActual++;}
  if(mesActual<0){mesActual=11;anioActual--;}
  renderCalendario();
}

// SIDEBAR

function seleccionarDia(fechaStr){ diaSeleccionado=fechaStr; renderCalendario(); renderSidebar(fechaStr); }

function renderSidebar(fechaStr) {
  const [y,m,d]=fechaStr.split("-").map(Number);
  const fecha=new Date(y,m-1,d);
  const nombre=fecha.toLocaleDateString("es-GT",{weekday:"long",day:"numeric",month:"long"});
  const ps=pedidos.filter(p=>p.fechaEntrega===fechaStr&&p.estado!=="Entregado");
  const dr=diasRestantes(fechaStr);

  document.getElementById("sidebarTitulo").textContent=nombre;
  document.getElementById("sidebarSub").textContent=ps.length===0?"Sin entregas":`${ps.length} entrega${ps.length!==1?"s":""}`;

  // Alerta del día
  const alEl=document.getElementById("alertaDia");
  alEl.innerHTML="";
  if(ps.length>0){
    const al=document.createElement("div");
    al.className="alerta-dia "+(dr<0?"al-rojo":dr===0?"al-rojo":dr<=1?"al-naranja":"al-verde");
    al.innerHTML=dr<0?`⚠️ Venció hace ${Math.abs(dr)} día(s)`:dr===0?"🚨 ¡Entregas HOY!":dr===1?"🔥 ¡Entrega mañana!":"📅 Faltan "+dr+" días";
    alEl.appendChild(al);
  }

  const list=document.getElementById("sidebarList");
  if(ps.length===0){ list.innerHTML='<div class="sidebar-empty">✅<br>Sin entregas este día</div>'; return; }
  list.innerHTML="";
  ps.sort((a,b)=>{ const ord={Listo:0,"En proceso":1,Pendiente:2}; return (ord[a.estado]||9)-(ord[b.estado]||9); });
  ps.forEach(p=>{
    const dr2=diasRestantes(p.fechaEntrega);
    const el=document.createElement("div");
    el.className="pedido-item"+(dr2<0?" urgente":dr2===0?" hoy":"");
    el.innerHTML=`
      ${p.foto?`<img src="${p.foto}" class="pi-foto" alt="">`:`<div class="pi-foto-ph">👕</div>`}
      <div class="pi-info">
        <div class="pi-nombre">${p.equipo||p.cliente}</div>
        <div class="pi-sub">👤 ${p.cliente}${p.deporte?" · "+p.deporte:""}</div>
        <div class="pi-meta">
          <span class="badge" style="background:${EC[p.estado]}22;color:${EC[p.estado]};border:1px solid ${EC[p.estado]}44">${p.estado}</span>
          <span style="font-size:10px;color:var(--mu)">👕${p.items.length}</span>
        </div>
      </div>
      <div class="pi-dias" style="color:${colorDias(dr2)}">${textoDias(dr2)}</div>`;
    el.onclick=()=>abrirModal(p);
    list.appendChild(el);
  });
}

// ══════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════
function abrirModal(p){ window._mp=p; tabActual="lista"; renderModal(); document.getElementById("overlay").style.display="flex"; }
function cerrarModal(){ document.getElementById("overlay").style.display="none"; }
function cambiarTab(t){ tabActual=t; renderModal(); }

function renderModal() {
  const p=window._mp; if(!p) return;
  const tc=p.items.reduce((a,it)=>{ a[it.talla]=(a[it.talla]||0)+1; return a; },{});
  const porteros=p.items.filter(i=>i.portero);
  const pagos=p.pagos||[];
  const totalPagado=pagos.reduce((a,pg)=>a+Number(pg.monto||0),0);
  const pendiente=Number(p.total||0)-totalPagado;
  const dr=diasRestantes(p.fechaEntrega);

  document.getElementById("modalContent").innerHTML=`
    ${p.foto?`<img src="${p.foto}" class="modal-foto" alt="">`:""}
    <div class="modal-hdr">
      <div>
        <div class="modal-titulo">${p.equipo||p.cliente}</div>
        <div class="modal-sub">
          ${p.deporte?`<span>🏆 ${p.deporte}</span>`:""}
          <span>👤 ${p.cliente}</span>
          ${p.telefono?`<span>📱 ${p.telefono}</span>`:""}
          <span class="badge" style="background:${EC[p.estado]}22;color:${EC[p.estado]};border:1px solid ${EC[p.estado]}44">${p.estado}</span>
          ${dr!==null?`<span style="color:${colorDias(dr)};font-weight:700">${textoDias(dr)}</span>`:""}
        </div>
      </div>
      <button class="close-btn" onclick="cerrarModal()">✕</button>
    </div>
    <div class="tabs">
      ${["lista","tallas","info"].map(t=>`<button class="tab-btn ${tabActual===t?"on":""}" onclick="cambiarTab('${t}')">${t==="lista"?"📋 Lista completa":t==="tallas"?"📊 Tallas":"ℹ️ Info"}</button>`).join("")}
    </div>
    ${tabActual==="lista"?`
      <div style="overflow-x:auto;border-radius:8px;border:1px solid var(--bor)">
        <table class="ptbl">
          <thead><tr><th>#</th><th>Camisola</th><th>Núm.</th><th>Talla</th><th>Género</th><th>Notas</th></tr></thead>
          <tbody>
            ${p.items.map((it,i)=>`<tr>
              <td style="color:var(--mu);font-size:11px">${i+1}</td>
              <td><b>${it.nombreCamisola||it.nombreJugador||"—"}</b> ${it.nombreJugador&&it.nombreCamisola&&it.nombreCamisola!==it.nombreJugador?`<span style="font-size:11px;color:var(--mu)">(${it.nombreJugador})</span>`:""}${it.portero?`<span style="font-size:10px;padding:1px 5px;border-radius:8px;background:rgba(59,130,246,.15);color:var(--bl);margin-left:3px">🧤</span>`:""}</td>
              <td class="num-cell">${it.numero||"—"}</td>
              <td><span class="talla-cell">${it.talla}</span></td>
              <td style="font-size:12px;color:var(--mu)">${it.genero}</td>
              <td style="font-size:12px;color:var(--mu)">${it.notas||"—"}</td>
            </tr>`).join("")}
          </tbody>
        </table>
      </div>
      ${porteros.length>0?`<div style="margin-top:10px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);border-radius:var(--rs);padding:9px 13px;font-size:12px;color:var(--bl)">🧤 <b>Portero(s):</b> ${porteros.map(pt=>pt.nombreCamisola||pt.nombreJugador||"—").join(", ")}</div>`:""}
    `:tabActual==="tallas"?`
      <div class="talla-grid">
        ${Object.entries(tc).map(([k,v])=>`<div class="talla-card"><div class="talla-num">${v}</div><div class="talla-lbl">${k}</div></div>`).join("")}
      </div>
      <div style="margin-top:10px;background:var(--s2);border-radius:var(--rs);padding:10px 14px;font-size:12px;color:var(--mu)">
        Total: <b style="color:var(--tx)">${p.items.length} prendas</b>${porteros.length>0?` · 🧤 ${porteros.length} portero(s)`:""}
      </div>
    `:`
      <div class="info-grid">
        <div class="info-card"><div class="info-lbl">Entrega</div><div class="info-val">${p.fechaEntrega||"—"}</div></div>
        <div class="info-card"><div class="info-lbl">Prendas</div><div class="info-val" style="color:var(--acc)">${p.items.length}</div></div>

// ══════════════════════════════════════════
// NOTIFICACIONES
// ══════════════════════════════════════════
let toastQueue=[], mostrandoToast=false;

function bloqueHorario(){
  const now=new Date(), h=now.getHours();
  const bloque=HORAS_ALERTA.reduce((a,b)=>Math.abs(b-h)<Math.abs(a-h)?b:a);
  const diff=h*60+now.getMinutes()-bloque*60;
  if(diff<0||diff>30) return null;
  return `${hoy()}-${bloque}`;
}
function cargarNotifs(){ try{return JSON.parse(localStorage.getItem("malijr_nd")||"{}");}catch{return{};} }
function guardarNotifs(o){ try{localStorage.setItem("malijr_nd",JSON.stringify(o));}catch{} }

function verificarNotificaciones(){
  const bloque=bloqueHorario(); if(!bloque) return;
  const env=cargarNotifs(); const nuevas=[];
  pedidos.forEach(p=>{
    if(p.estado==="Entregado") return;
    const d=diasRestantes(p.fechaEntrega); if(d===null) return;
    const n=p.equipo||p.cliente;
    [{key:`${p.id}-3d-${bloque}`,cond:d===3,titulo:"⏰ Entrega en 3 días",body:`"${n}" · ${p.items.length} prendas`,color:"#ff5c00",urgente:false},
     {key:`${p.id}-1d-${bloque}`,cond:d===1,titulo:"🔥 ¡Entrega mañana!",body:`"${n}" debe estar listo HOY`,color:"#f59e0b",urgente:false},
     {key:`${p.id}-0d-${bloque}`,cond:d===0,titulo:"🚨 ¡ENTREGA HOY!",body:`"${n}" · Confirmar con ${p.cliente}`,color:"#ef4444",urgente:true}
    ].forEach(({key,cond,titulo,body,color,urgente})=>{
      if(cond&&!env[key]){ env[key]=new Date().toISOString(); nuevas.push({titulo,body,color,urgente}); }
    });
  });
  if(nuevas.length>0){ guardarNotifs(env); nuevas.forEach((n,i)=>setTimeout(()=>encolarToast(n.titulo,n.body,n.color,n.urgente),i*8000)); }
}

function encolarToast(titulo,body,color,urgente){ toastQueue.push({titulo,body,color,urgente}); if(!mostrandoToast) siguienteToast(); }
function siguienteToast(){ if(!toastQueue.length){mostrandoToast=false;return;} mostrandoToast=true; const t=toastQueue.shift(); mostrarToast(t.titulo,t.body,t.color,t.urgente); setTimeout(siguienteToast,9000); }

function aplazarToast(){
  const el=document.getElementById("notifToast");
  const d=el._d; el.style.display="none";
  if(d) setTimeout(()=>encolarToast(d.titulo,d.body,d.color,d.urgente),3600000);
  encolarToast("⏰ Pospuesto","Te recordamos en 1 hora","#6b7a99",false);
}

function mostrarToast(titulo,body,color="#ff5c00",urgente=false){
  const el=document.getElementById("notifToast");
  el.style.background=color;
  el.style.boxShadow=urgente?`0 6px 24px ${color}88`:"0 6px 24px rgba(0,0,0,.5)";
  el.innerHTML=`<div class="notif-titulo">${titulo}</div><div class="notif-body">${body}</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
      <span style="font-size:10px;opacity:.7">${new Date().toLocaleTimeString("es-GT",{hour:"2-digit",minute:"2-digit"})}</span>
      <button onclick="aplazarToast()" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.5);color:#fff;border-radius:12px;padding:3px 10px;font-size:11px;cursor:pointer;font-weight:600">⏰ Aplazar 1h</button>
    </div>`;
  el._d={titulo,body,color,urgente};
  el.style.display="block";
  sonarAlerta(urgente);
  if(urgente){ document.body.style.transition="background .2s"; document.body.style.background="#3a0000"; setTimeout(()=>document.body.style.background="",500); }
  setTimeout(()=>{ if(el.style.display!=="none") el.style.display="none"; },8000);
}

renderCalendario();
seleccionarDia(hoy());
